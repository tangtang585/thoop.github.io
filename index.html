<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Game</title>
    <style>
        body {
            background-color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #gameContainer {
            width: 600px;
            height: 200px;
            border-bottom: 2px solid #535353;
            position: relative;
            background-color: #f7f7f7;
        }

        #dino {
            width: 40px;
            height: 43px;
            background-color: #535353; /* Placeholder for Dino */
            position: absolute;
            bottom: 0;
            left: 50px;
        }

        .jump {
            animation: jump 0.5s linear;
        }

        .cactus {
            width: 20px;
            height: 40px;
            background-color: #808080; /* Placeholder for Cactus */
            position: absolute;
            bottom: 0;
            left: 580px;
            animation: blockMove 1.5s infinite linear;
        }

        #scoreBoard {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            color: #535353;
        }

        #gameOverText {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #535353;
            text-align: center;
        }

        @keyframes jump {
            0% { bottom: 0; }
            30% { bottom: 100px; }
            70% { bottom: 100px; }
            100% { bottom: 0; }
        }

        @keyframes blockMove {
            0% { left: 580px; }
            100% { left: -20px; }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="scoreBoard">Score: <span id="score">0</span></div>
        <div id="dino"></div>
        <div id="cactus" class="cactus"></div>
        <div id="gameOverText">
            GAME OVER<br>
            <span style="font-size: 14px; font-weight: normal;">Press Space / Tap to Restart</span>
        </div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreDisplay = document.getElementById("score");
        const gameOverText = document.getElementById("gameOverText");
        
        let score = 0;
        let isAlive = true;

        // Jump function
        function jump() {
            if (!dino.classList.contains("jump") && isAlive) {
                dino.classList.add("jump");
                setTimeout(function () {
                    dino.classList.remove("jump");
                }, 500);
            }
        }

        // Listen for Spacebar or click/tap
        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                if (!isAlive) {
                    restartGame();
                } else {
                    jump();
                }
            }
        });

        document.addEventListener("touchstart", function() {
            if (!isAlive) {
                restartGame();
            } else {
                jump();
            }
        });

        // Game loop checking for collisions and updating score
        let gameLoop = setInterval(function () {
            if (!isAlive) return;

            // Get current positions
            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
            let cactusLeft = parseInt(window.getComputedStyle(cactus).getPropertyValue("left"));

            // Detect collision
            if (cactusLeft > 50 && cactusLeft < 90 && dinoBottom <= 40) {
                // End game
                isAlive = false;
                cactus.style.animation = "none";
                cactus.style.left = `${cactusLeft}px`;
                gameOverText.style.display = "block";
            } else {
                // Increase score
                score++;
                scoreDisplay.innerText = Math.floor(score / 10);
            }
        }, 10);

        function restartGame() {
            isAlive = true;
            score = 0;
            scoreDisplay.innerText = "0";
            gameOverText.style.display = "none";
            cactus.style.left = "580px";
            cactus.style.animation = "blockMove 1.5s infinite linear";
        }
    </script>
</body>
</html>
